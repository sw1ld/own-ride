<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="utf-8">
        <title>Statistics - Fit Application</title>

        <meta name="description" content="">
        <meta name="viewport" content="width=device-width, initial-scale=1">
        <meta name="format-detection" content="telephone=no">
        <meta name="msapplication-tap-highlight" content="no">

        <link rel="icon" type="image/x-icon" href="/favicon.ico">

        <link
            rel="stylesheet"
            href="https://cdn.jsdelivr.net/npm/bulma@0.9.4/css/bulma.min.css"
        />
        <link
            rel="stylesheet"
            href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
        />
        <script src="https://cdn.jsdelivr.net/npm/chart.js" defer></script>

        <style>
            #map {
                height: 60vh;
                width: 100%;
            }
            th.sortable {
                cursor: pointer;
                user-select: none;
            }
            .arrow {
                font-size: 0.8em;
                margin-left: 4px;
            }
            .charts {
                display: grid;
                grid-template-columns: repeat(auto-fit, minmax(350px, 1fr));
                gap: 1.5rem;
                align-items: start;
            }
            .chart {
                padding: 1rem;
                border-radius: 8px;
            }
            .canvas {
                width: 100%;
                height: 100%;
            }
        </style>
    </head>

    <body>
        <nav class="navbar" role="navigation" aria-label="main navigation">
            <div class="navbar-brand">
                <a class="navbar-item" href="/fit/stats">
                    <strong>Fit App</strong>
                </a>

                <a role="button" class="navbar-burger" aria-label="menu" aria-expanded="false" data-target="mainNavbar">
                    <span aria-hidden="true"></span>
                    <span aria-hidden="true"></span>
                    <span aria-hidden="true"></span>
                </a>
            </div>

            <div id="mainNavbar" class="navbar-menu">
                <div class="navbar-start">
                    <a class="navbar-item year-link" href="/fit/upload">Upload</a>
                    <a class="navbar-item year-link" href="/fit/stats">Dashboard</a>
                    <a class="navbar-item year-link" href="/fit/details">Details</a>
                </div>
            </div>
        </nav>

        <section class="section">
            <div class="container">
                <div class="columns">
                    {#if showYearFilter}
                    <div class="column is-3-tablet is-12-mobile">
                        <div class="field">
                            <div class="control">
                                <div class="select is-fullwidth">
                                    <select id="yearFilter">
                                        {#for y in availableYears}
                                            <option value="{y}">{y}</option>
                                        {/for}
                                    </select>
                                </div>
                            </div>
                        </div>
                    </div>
                    {/if}
                </div>
                {#insert}Missing body! 😿{/}
            </div>
        </section>

        <script src="/filters.js" defer></script>
        <script>
            document.addEventListener('DOMContentLoaded', () => {
                const $navbarBurgers = Array.prototype.slice.call(document.querySelectorAll('.navbar-burger'), 0);
                if ($navbarBurgers.length > 0) {
                    $navbarBurgers.forEach( el => {
                        el.addEventListener('click', () => {
                            const target = el.dataset.target;
                            const $target = document.getElementById(target);
                            el.classList.toggle('is-active');
                            $target.classList.toggle('is-active');
                        });
                    });
                }
            });
        </script>
    </body>
</html>
